services:
  postgres:
    image: postgres:16-alpine
    container_name: mailviz-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mailviz
      POSTGRES_PASSWORD: mailviz_dev
      POSTGRES_DB: mailviz_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailviz -d mailviz_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
